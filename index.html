<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator with History</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <!-- Calculator Card -->
        <section class="calculator-card" aria-label="Calculator">
            <header class="calculator-header">
                <h1>CalcStream</h1>
                <span class="status-indicator" id="status-indicator">Local Memory</span>
            </header>

            <div class="display-container">
                <div class="expression-preview" id="expression-preview"></div>
                <input type="text" id="display" placeholder="0" readonly aria-label="Calculator Display">
            </div>

            <div class="keypad">
                <!-- Row 1 -->
                <button class="btn btn-action" onclick="clearDisplay()" id="btn-clear">C</button>
                <button class="btn btn-action" onclick="append('(')">(</button>
                <button class="btn btn-action" onclick="append(')')">)</button>
                <button class="btn btn-operator" onclick="append('/')">/</button>

                <!-- Row 2 -->
                <button class="btn btn-number" onclick="append('7')">7</button>
                <button class="btn btn-number" onclick="append('8')">8</button>
                <button class="btn btn-number" onclick="append('9')">9</button>
                <button class="btn btn-operator" onclick="append('*')">&times;</button>

                <!-- Row 3 -->
                <button class="btn btn-number" onclick="append('4')">4</button>
                <button class="btn btn-number" onclick="append('5')">5</button>
                <button class="btn btn-number" onclick="append('6')">6</button>
                <button class="btn btn-operator" onclick="append('-')">-</button>

                <!-- Row 4 -->
                <button class="btn btn-number" onclick="append('1')">1</button>
                <button class="btn btn-number" onclick="append('2')">2</button>
                <button class="btn btn-number" onclick="append('3')">3</button>
                <button class="btn btn-operator" onclick="append('+')">+</button>

                <!-- Row 5 -->
                <button class="btn btn-number" onclick="append('0')">0</button>
                <button class="btn btn-number" onclick="append('.')">.</button>
                <button class="btn btn-action" onclick="backspace()" id="btn-del">DEL</button>
                <button class="btn btn-equals" onclick="calculate()" id="btn-equals">=</button>
            </div>
        </section>

        <!-- History Card -->
        <section class="history-card" aria-label="Calculation History">
            <header class="history-header">
                <h2>History</h2>
                <button class="btn-clear-history" id="clear-history-btn" onclick="clearHistory()" title="Clear all history">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Clear
                </button>
            </header>
            <div class="history-list" id="history-list">
                <div class="history-placeholder">No history yet</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
